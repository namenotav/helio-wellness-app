[phases.setup]
nixPkgs = ["nodejs"]

[phases.install]
cmds = ["cp package-server.json package.json", "npm install --omit=dev"]

[phases.build]
cmds = ["mkdir -p dist && echo '{\"status\":\"api-server\"}' > dist/index.html"]

[start]
cmd = "mkdir -p dist && echo '{\"status\":\"ok\"}' > dist/index.html && node server.js"
